name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package-version.outputs.version }}
      tag_exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check-tag
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists — skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt pyinstaller

      - name: Build backend
        shell: bash
        run: |
          cd backend
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --clean --noconfirm --onedir \
            --name finance_server_bin \
            --add-data "finance_server/assets${SEP}finance_server/assets" \
            --hidden-import finance_server \
            --hidden-import finance_server.api \
            --hidden-import finance_server.api.transactions \
            --hidden-import finance_server.api.fints \
            --hidden-import finance_server.api.bank_credentials \
            --hidden-import finance_server.api.reference_data \
            --hidden-import finance_server.api.categories \
            --hidden-import finance_server.db \
            --hidden-import finance_server.db.connection \
            --hidden-import finance_server.db.credentials \
            --hidden-import finance_server.db.paths \
            --hidden-import finance_server.db.references \
            --hidden-import finance_server.db.schema \
            --hidden-import finance_server.db.transactions \
            --hidden-import finance_server.db.categories \
            --hidden-import finance_server.db.utils \
            --hidden-import finance_server.banks \
            --hidden-import finance_server.models \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import fastapi \
            --hidden-import pydantic \
            --hidden-import dotenv \
            --hidden-import cryptography \
            --hidden-import cryptography.fernet \
            --hidden-import fints \
            --hidden-import fints.client \
            --hidden-import fints.exceptions \
            --hidden-import fints.utils \
            --hidden-import fints.formals \
            run_server.py

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --publish always
        shell: bash

  create-tag:
    needs: [check-version, build]
    if: success() && needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
